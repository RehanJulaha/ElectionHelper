<h2 class="page-title">{{ 'locator.title' | transloco }}</h2>
<p class="lede">{{ 'locator.lede' | transloco }}</p>
@if (!hasKey()) {
  <p class="muted" role="status">{{ 'locator.missingKey' | transloco }}</p>
} @else {
  <div class="locator-toolbar">
    <label class="locator-toolbar__label" for="eci-place-select">{{ 'locator.placeLabel' | transloco }}</label>
    <select
      id="eci-place-select"
      class="locator-toolbar__select"
      [value]="selectedPlaceId()"
      (change)="onPlaceChange($event)"
    >
      @for (pid of placeIds; track pid) {
        <option [value]="pid">{{ ('locator.places.' + pid) | transloco }}</option>
      }
    </select>
  </div>
  @if (embedSrc(); as src) {
    <div class="map-frame">
      <iframe
        class="map-frame__embed"
        [title]="'locator.iframeTitle' | transloco"
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"
        [src]="src"
      ></iframe>
    </div>
    <p class="muted small">{{ 'locator.disclaimer' | transloco }}</p>
  }
}
