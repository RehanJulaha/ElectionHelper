steps:
  - name: node:20
    entrypoint: npm
    args: ['ci']
  - name: node:20
    entrypoint: npm
    args: ['run', 'build']
  - name: node:20
    entrypoint: npm
    args: ['run', 'test:ci']
  - name: node:20
    dir: functions
    entrypoint: npm
    args: ['ci']
  - name: node:20
    dir: functions
    entrypoint: npm
    args: ['run', 'build']
  - name: node:20
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        if [[ -z "${_FIREBASE_CI_TOKEN:-}" ]]; then
          echo "Skipping Firebase deploy: set substitution _FIREBASE_CI_TOKEN in Cloud Build trigger."
          exit 0
        fi
        npm install -g firebase-tools@13
        firebase deploy --only "hosting,firestore,functions" --project "${PROJECT_ID}" --non-interactive --token "${_FIREBASE_CI_TOKEN}"

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _FIREBASE_CI_TOKEN: ''
