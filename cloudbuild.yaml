# Election Process Assistant — Google Cloud Build → Firebase
#
# Prereqs (one-time in GCP / Firebase):
#   - Billing on the Firebase/GCP project (Blaze) if you deploy Cloud Functions (2nd gen).
#   - Cloud Build API enabled; Cloud Build SA can run this build.
#   - For `firebase deploy`: Secret Manager secret `firebase-ci-token` → env FIREBASE_CI_TOKEN (see availableSecrets below).
#   - For Firestore rules: Firestore API enabled + database created in console.
#
# Deploy mode (substitution _FIREBASE_DEPLOY_MODE — avoids comma issues in gcloud --substitutions):
#   - hosting     — SPA only (default; works without Blaze).
#   - hosting-fs  — hosting + Firestore rules (enable Firestore API + create DB first).
#   - full        — hosting + firestore + functions (Blaze + Function secrets required).
#
# Examples:
#   gcloud builds submit --config=cloudbuild.yaml --project=YOUR_PROJECT_ID .
#   gcloud builds submit --config=cloudbuild.yaml --project=YOUR_PROJECT_ID \
#     --substitutions=_FIREBASE_DEPLOY_MODE=full
#
steps:
  - name: node:20
    entrypoint: npm
    args: ['ci']
  - name: node:20
    entrypoint: npm
    args: ['run', 'build']
  - name: node:20
    entrypoint: npm
    args: ['run', 'test:ci']
  - name: node:20
    dir: functions
    entrypoint: npm
    args: ['ci']
  - name: node:20
    dir: functions
    entrypoint: npm
    args: ['run', 'build']
  - name: node:20
    entrypoint: bash
    secretEnv: ['FIREBASE_CI_TOKEN']
    args:
      - -c
      - |
        set -euo pipefail
        TOKEN="${FIREBASE_CI_TOKEN:-}"
        if [[ -z "${TOKEN}" ]]; then
          echo "Skipping Firebase deploy: add Secret Manager secret firebase-ci-token (empty value skips deploy) or set FIREBASE_CI_TOKEN for this build."
          exit 0
        fi
        MODE="${_FIREBASE_DEPLOY_MODE:-hosting}"
        case "${MODE}" in
          full) TARGETS="hosting,firestore,functions" ;;
          hosting-fs) TARGETS="hosting,firestore" ;;
          hosting) TARGETS="hosting" ;;
          *)
            echo "Unknown _FIREBASE_DEPLOY_MODE=${MODE}; use hosting | hosting-fs | full"
            exit 1
            ;;
        esac
        echo "Firebase deploy mode=${MODE} → --only ${TARGETS}"
        npm install -g firebase-tools@13
        firebase deploy --only "${TARGETS}" --project "${PROJECT_ID}" --non-interactive --token "${TOKEN}"

options:
  logging: CLOUD_LOGGING_ONLY

# Map Secret Manager → FIREBASE_CI_TOKEN for the deploy step.
# Create secret id `firebase-ci-token` (empty payload = skip firebase deploy but still run tests/build).
# Grant the Cloud Build service account roles/secretmanager.secretAccessor on that secret.
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_NUMBER/secrets/firebase-ci-token/versions/latest
      env: FIREBASE_CI_TOKEN

substitutions:
  _FIREBASE_DEPLOY_MODE: hosting
