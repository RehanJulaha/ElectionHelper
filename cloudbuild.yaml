steps:
  - name: node:20
    entrypoint: npm
    args: ['ci']
  - name: node:20
    entrypoint: npm
    args: ['run', 'build']
  - name: node:20
    entrypoint: npm
    args: ['run', 'test:ci']
  - name: node:20
    dir: functions
    entrypoint: npm
    args: ['ci']
  - name: node:20
    dir: functions
    entrypoint: npm
    args: ['run', 'build']
  - name: node:20
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        TOKEN="${FIREBASE_CI_TOKEN:-}"
        if [[ -z "${TOKEN}" ]]; then
          TOKEN="${_FIREBASE_CI_TOKEN:-}"
        fi
        if [[ -z "${TOKEN}" ]]; then
          echo "Skipping Firebase deploy: bind Secret Manager secret to env FIREBASE_CI_TOKEN or set substitution _FIREBASE_CI_TOKEN on the trigger."
          exit 0
        fi
        npm install -g firebase-tools@13
        firebase deploy --only "hosting,firestore,functions" --project "${PROJECT_ID}" --non-interactive --token "${TOKEN}"

options:
  logging: CLOUD_LOGGING_ONLY

# Optional: map a Secret Manager version to env FIREBASE_CI_TOKEN for CI tokens
# (preferred over long-lived substitution values). Example:
# availableSecrets:
#   secretManager:
#     - versionName: projects/$PROJECT_ID/secrets/firebase-ci-token/versions/latest
#       env: FIREBASE_CI_TOKEN
# and add `secretEnv: ['FIREBASE_CI_TOKEN']` on the deploy step above.

substitutions:
  _FIREBASE_CI_TOKEN: ''
