name: ci
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx ng lint
      - run: npx vitest run --coverage
      - run: npx ng test --no-watch --browsers=ChromeHeadless
      - uses: actions/upload-artifact@4cec3f8aa04e39d1a68397de0c4cd6fb9dce8ec1
        with:
          name: coverage-vitest
          path: coverage/

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npx playwright test
        env:
          CI: 'true'

  forbidden-paths:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Block tracked agent paths
        run: |
          set -euo pipefail
          if git ls-files | grep -E '^\.cursor/'; then
            echo "Remove .cursor paths from git index"
            exit 1
          fi
