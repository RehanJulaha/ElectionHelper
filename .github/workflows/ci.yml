name: ci
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx ng lint
      - run: npm run build
      - run: npx vitest run --coverage
      - run: npm run test:i18n
      - run: npx ng test --no-watch --browsers=ChromeHeadless
      # Pinned to actions/upload-artifact v4 tag (valid commit; previous SHA was invalid).
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: coverage-vitest
          path: coverage/

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npx playwright test
        env:
          CI: 'true'

  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Lighthouse CI (assertions from repo-root lighthouserc.json)
        run: |
          npx http-server dist/epa/browser -p 4200 -c-1 -s &
          sleep 3
          npx @lhci/cli autorun --config=./lighthouserc.json

  percy:
    if: ${{ secrets.PERCY_TOKEN != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - name: Percy visual snapshots (BrowserStack Percy)
        run: npx percy exec -- npx playwright test e2e/percy.spec.ts
        env:
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}

  deploy-cloud-build:
    if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && secrets.GCP_SA_KEY != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: '22'
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Submit Cloud Build (only supported deploy path)
        run: |
          set -euo pipefail
          PROJECT_ID="$(node -e "console.log(JSON.parse(require('fs').readFileSync('.firebaserc','utf8')).projects.default)")"
          gcloud builds submit --config=cloudbuild.yaml --project="${PROJECT_ID}" .

  forbidden-paths:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Block tracked agent paths
        run: |
          set -euo pipefail
          if git ls-files | grep -E '^\.cursor/'; then
            echo "Remove local IDE tooling paths from git index (see workflow comment)"
            exit 1
          fi
